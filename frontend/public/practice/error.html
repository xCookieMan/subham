<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Frame Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #030305;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #030305;
        }

        .cinema-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .cinema-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(0, 60, 180, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(180, 60, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(120, 0, 200, 0.08) 0%, transparent 40%);
        }

        .cinema-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.7) 100%);
        }

        .grain {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            opacity: 0.035;
            pointer-events: none;
            z-index: 50;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            animation: grainShift 0.3s steps(1) infinite;
        }

        @keyframes grainShift {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-2%, 3%);
            }

            50% {
                transform: translate(3%, -2%);
            }

            75% {
                transform: translate(-3%, -3%);
            }

            100% {
                transform: translate(2%, 1%);
            }
        }

        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 40;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
        }

        .scan-beam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.015) 20%,
                    rgba(255, 255, 255, 0.04) 50%,
                    rgba(255, 255, 255, 0.015) 80%,
                    transparent 100%);
            pointer-events: none;
            z-index: 45;
            animation: beamDown 10s linear infinite;
        }

        @keyframes beamDown {
            0% {
                top: -3px;
            }

            100% {
                top: 100%;
            }
        }

        .error-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .error-code-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 250px;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
        }

        .digit {
            position: relative;
            display: inline-block;
            transition: all 0.5s ease;
            /* Mixed gradient colors for each digit */
            background: linear-gradient(135deg,
                    #0088ff 0%,
                    #8844ff 25%,
                    #ff5522 50%,
                    #ff8844 75%,
                    #00ccff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.4);
            animation: digitFloat 4s ease-in-out infinite, colorShift 5s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(100, 100, 255, 0.3)) drop-shadow(0 0 60px rgba(139, 92, 246, 0.15));
        }

        .digit:nth-child(1) {
            animation-delay: 0s, 0s;
        }

        .digit:nth-child(2) {
            animation-delay: 0.3s, 1s;
        }

        .digit:nth-child(3) {
            animation-delay: 0.6s, 2s;
        }

        @keyframes digitFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes colorShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Glitch layers with different colors */
        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 250px;
            font-weight: 800;
            letter-spacing: -15px;
            line-height: 0.9;
            pointer-events: none;
            opacity: 0;
            display: flex;
            justify-content: center;
        }

        .glitch-layer-1 {
            color: rgba(255, 0, 80, 0.5);
            animation: glitch1 8s infinite;
            mix-blend-mode: screen;
        }

        .glitch-layer-2 {
            color: rgba(0, 200, 255, 0.4);
            animation: glitch2 8s infinite 1s;
            mix-blend-mode: screen;
        }

        .glitch-layer-3 {
            color: rgba(200, 100, 255, 0.3);
            animation: glitch3 8s infinite 2s;
            mix-blend-mode: screen;
        }

        @keyframes glitch1 {

            0%,
            92%,
            100% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }

            93% {
                opacity: 0.6;
                transform: translate(-5px, 2px);
                clip-path: inset(20% 0 40% 0);
            }

            94% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }

            95% {
                opacity: 0.4;
                transform: translate(3px, -1px);
                clip-path: inset(60% 0 10% 0);
            }

            96% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }
        }

        @keyframes glitch2 {

            0%,
            94%,
            100% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }

            95% {
                opacity: 0.5;
                transform: translate(4px, -2px);
                clip-path: inset(10% 0 60% 0);
            }

            96% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }

            97% {
                opacity: 0.3;
                transform: translate(-2px, 3px);
                clip-path: inset(40% 0 20% 0);
            }

            98% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }
        }

        @keyframes glitch3 {

            0%,
            96%,
            100% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }

            97% {
                opacity: 0.4;
                transform: translate(-3px, 1px);
                clip-path: inset(30% 0 30% 0);
            }

            98% {
                opacity: 0;
                transform: translate(0);
                clip-path: none;
            }
        }

        .error-reflection {
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            text-align: center;
            transform: scaleY(-0.35) translateY(-20px);
            opacity: 0.15;
            filter: blur(6px);
            pointer-events: none;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
        }

        .error-reflection .digit {
            animation: none !important;
        }

        /* Subtitle with animation */
        .error-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.3s forwards, subtitlePulse 4s ease-in-out infinite 2s;
            position: relative;
        }

        .error-subtitle::before,
        .error-subtitle::after {
            content: 'Frame Not Found';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
        }

        .error-subtitle::before {
            color: rgba(255, 0, 80, 0.4);
            animation: subtitleGlitch1 6s infinite;
        }

        .error-subtitle::after {
            color: rgba(0, 200, 255, 0.3);
            animation: subtitleGlitch2 6s infinite 1s;
        }

        @keyframes subtitlePulse {

            0%,
            100% {
                opacity: 0.85;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes subtitleGlitch1 {

            0%,
            90%,
            100% {
                opacity: 0;
                transform: translate(0);
            }

            91% {
                opacity: 0.5;
                transform: translate(-3px, 1px);
            }

            92% {
                opacity: 0;
                transform: translate(0);
            }
        }

        @keyframes subtitleGlitch2 {

            0%,
            93%,
            100% {
                opacity: 0;
                transform: translate(0);
            }

            94% {
                opacity: 0.4;
                transform: translate(3px, -1px);
            }

            95% {
                opacity: 0;
                transform: translate(0);
            }
        }

        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(0, 170, 255, 0.5),
                    rgba(136, 68, 255, 0.5),
                    rgba(255, 85, 34, 0.5),
                    transparent);
            margin: 28px auto;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards, shimmer 3s ease-in-out infinite 2s;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.5;
                width: 120px;
            }

            50% {
                opacity: 1;
                width: 160px;
            }
        }

        .error-desc {
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.9;
            margin-bottom: 45px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .error-desc span {
            display: block;
            margin-top: 6px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            animation: descFade 1s ease 1s forwards;
            opacity: 0;
        }

        @keyframes descFade {
            to {
                opacity: 1;
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 16px 44px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards, buttonGlow 3s ease-in-out infinite 2s;
        }

        @keyframes buttonGlow {

            0%,
            100% {
                box-shadow: 0 0 0 rgba(0, 170, 255, 0);
            }

            50% {
                box-shadow: 0 0 20px rgba(0, 170, 255, 0.1);
            }
        }

        .back-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg,
                    rgba(0, 170, 255, 0.08),
                    rgba(136, 68, 255, 0.08),
                    rgba(255, 85, 34, 0.08));
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .back-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.06), transparent 60%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .back-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 170, 255, 0.08),
                0 0 80px rgba(136, 68, 255, 0.05);
        }

        .back-btn:hover::before,
        .back-btn:hover::after {
            opacity: 1;
        }

        .back-btn i {
            font-size: 16px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .back-btn span {
            position: relative;
            z-index: 1;
        }

        .back-btn:hover i {
            transform: translateX(6px);
        }

        .bottom-bar {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 25px;
            opacity: 0;
            animation: fadeInUp 1s ease 1s forwards;
        }

        .bottom-item {
            font-family: 'Space Grotesk', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bottom-item.rec {
            color: rgba(255, 60, 60, 0.45);
        }

        .bottom-item.rec::before {
            content: '';
            width: 6px;
            height: 6px;
            background: rgba(255, 60, 60, 0.5);
            border-radius: 50%;
            animation: recBlink 1s steps(1) infinite;
        }

        @keyframes recBlink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        .bottom-item.timecode {
            color: rgba(255, 255, 255, 0.25);
        }

        .bottom-item.err {
            color: rgba(255, 100, 100, 0.3);
        }

        .separator {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .corner {
            position: absolute;
            z-index: 20;
            pointer-events: none;
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.06);
        }

        .corner.tl {
            top: 40px;
            left: 40px;
        }

        .corner.tl::before {
            top: 0;
            left: 0;
            width: 1px;
            height: 25px;
        }

        .corner.tl::after {
            top: 0;
            left: 0;
            width: 25px;
            height: 1px;
        }

        .corner.tr {
            top: 40px;
            right: 40px;
        }

        .corner.tr::before {
            top: 0;
            right: 0;
            width: 1px;
            height: 25px;
        }

        .corner.tr::after {
            top: 0;
            right: 0;
            width: 25px;
            height: 1px;
        }

        .corner.bl {
            bottom: 40px;
            left: 40px;
        }

        .corner.bl::before {
            bottom: 0;
            left: 0;
            width: 1px;
            height: 25px;
        }

        .corner.bl::after {
            bottom: 0;
            left: 0;
            width: 25px;
            height: 1px;
        }

        .corner.br {
            bottom: 40px;
            right: 40px;
        }

        .corner.br::before {
            bottom: 0;
            right: 0;
            width: 1px;
            height: 25px;
        }

        .corner.br::after {
            bottom: 0;
            right: 0;
            width: 25px;
            height: 1px;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 160px;
                letter-spacing: -8px;
            }

            .glitch-layer {
                font-size: 160px;
                letter-spacing: -8px;
            }

            .error-reflection .error-code {
                font-size: 160px;
                letter-spacing: -8px;
            }

            .error-subtitle {
                font-size: 16px;
                letter-spacing: 8px;
            }

            .corner {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 110px;
                letter-spacing: -5px;
            }

            .glitch-layer {
                font-size: 110px;
                letter-spacing: -5px;
            }

            .error-reflection .error-code {
                font-size: 110px;
                letter-spacing: -5px;
            }

            .error-subtitle {
                font-size: 14px;
                letter-spacing: 5px;
            }

            .back-btn {
                padding: 14px 32px;
                font-size: 11px;
                letter-spacing: 3px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="cinema-bg"></div>
        <div class="grain"></div>
        <div class="scanlines"></div>
        <div class="scan-beam"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="error-wrapper">
            <div class="error-code-container">
                <div class="glitch-layer glitch-layer-1">404</div>
                <div class="glitch-layer glitch-layer-2">404</div>
                <div class="glitch-layer glitch-layer-3">404</div>

                <div class="error-code">
                    <span class="digit">4</span><span class="digit">0</span><span class="digit">4</span>
                </div>

                <div class="error-reflection">
                    <div class="error-code">
                        <span class="digit">4</span><span class="digit">0</span><span class="digit">4</span>
                    </div>
                </div>
            </div>

            <div class="error-subtitle">Frame Not Found</div>
            <div class="divider"></div>
            <p class="error-desc">
                Looks like this scene doesn't exist.
                <span>Let's get you back on track.</span>
            </p>

            <a href="#" class="back-btn">
                <span>Back to Home</span>
                <i class="ri-arrow-right-up-line"></i>
            </a>
        </div>

        <div class="bottom-bar">
            <div class="bottom-item rec">REC</div>
            <div class="separator"></div>
            <div class="bottom-item timecode"><span id="timecode">00:00:00:00</span></div>
            <div class="separator"></div>
            <div class="bottom-item err">ERR: 404</div>
        </div>
    </div>

    <script>
        const timecodeEl = document.getElementById('timecode');
        let totalFrames = Math.floor(Math.random() * 50000);

        function updateTimecode() {
            totalFrames++;
            const f = totalFrames % 24;
            const s = Math.floor(totalFrames / 24) % 60;
            const m = Math.floor(totalFrames / (24 * 60)) % 60;
            const h = Math.floor(totalFrames / (24 * 60 * 60)) % 24;

            timecodeEl.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}:${String(f).padStart(2, '0')}`;
        }

        setInterval(updateTimecode, 1000 / 24);

        const errorContainer = document.querySelector('.error-code-container');

        function randomGlitchBurst() {
            const delay = Math.random() * 15000 + 8000;

            setTimeout(() => {
                const duration = 200 + Math.random() * 300;

                errorContainer.style.animation = 'none';
                const digits = document.querySelectorAll('.digit');
                digits.forEach(d => {
                    d.style.transform = `translate(${(Math.random() - 0.5) * 8}px, ${(Math.random() - 0.5) * 4}px)`;
                    d.style.opacity = 0.7 + Math.random() * 0.3;
                });

                setTimeout(() => {
                    digits.forEach(d => {
                        d.style.transform = '';
                        d.style.opacity = '';
                    });
                }, duration);

                randomGlitchBurst();
            }, delay);
        }

        randomGlitchBurst();

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;

            const bg = document.querySelector('.cinema-bg');
            bg.style.transform = `translate(${x * 10}px, ${y * 10}px)`;

            const digits = document.querySelectorAll('.digit');
            digits.forEach((d, i) => {
                const factor = (i - 1) * 3;
                d.style.margin = `${y * factor}px ${x * factor}px`;
            });
        });

        const btn = document.querySelector('.back-btn');
        btn.addEventListener('mousedown', () => {
            btn.style.transform = 'scale(0.96) translateY(0)';
        });
        btn.addEventListener('mouseup', () => {
            btn.style.transform = '';
        });
    </script>
</body>

</html>
